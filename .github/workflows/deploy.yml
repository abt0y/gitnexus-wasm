name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          wasm-pack --version

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Node dependencies
        run: |
          cd web
          npm ci

      - name: Setup emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.53 # Stable version for tree-sitter

      - name: Build Tree-sitter Parsers to WASM
        run: |
          mkdir -p web/public/parsers
          npm install -g tree-sitter-cli

          # Clone and build each grammar
          for lang in typescript python go rust java; do
            echo "Building $lang parser..."
            
            # Special handling for typescript (multiple grammars in one repo)
            if [ "$lang" == "typescript" ]; then
                git clone --depth 1 https://github.com/tree-sitter/tree-sitter-typescript.git /tmp/ts
                cd /tmp/ts/typescript
                tree-sitter build --wasm
                cp tree-sitter-typescript.wasm "$GITHUB_WORKSPACE/web/public/parsers/typescript.wasm"
                cd "$GITHUB_WORKSPACE"
            else
                git clone --depth 1 "https://github.com/tree-sitter/tree-sitter-$lang.git" "/tmp/$lang"
                cd "/tmp/$lang"
                tree-sitter build --wasm
                # Standard name is tree-sitter-{lang}.wasm
                cp *.wasm "$GITHUB_WORKSPACE/web/public/parsers/$lang.wasm"
                cd "$GITHUB_WORKSPACE"
            fi
          done

          ls -la web/public/parsers/

      - name: Build Rust WASM Core
        run: |
          cd crates/gitnexus-core
          wasm-pack build --target web --out-dir ../../web/pkg             --features "gitnexus-parse/web-tree-sitter"

          # Verify output
          ls -la ../../web/pkg/

      - name: Download Embedding Model Assets
        run: |
          mkdir -p web/public/assets
          curl -L "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/ort/all-MiniLM-L6-v2/onnx/model_quantized.onnx" -o web/public/assets/all-MiniLM-L6-v2-quantized.onnx
          curl -L "https://huggingface.co/Xenova/all-MiniLM-L6-v2/raw/main/tokenizer.json" -o web/public/assets/tokenizer.json
          ls -lh web/public/assets/

      - name: Build Web UI
        run: |
          cd web
          npm run build

          # Add .nojekyll to prevent Jekyll processing
          touch dist/.nojekyll

          # Copy WASM files to dist
          cp -r public/parsers dist/
          cp -r public/assets dist/

          # Verify build
          ls -la dist/
          ls -la dist/assets/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

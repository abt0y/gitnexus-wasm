name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          wasm-pack --version

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Node dependencies
        run: |
          cd web
          npm ci

      - name: Build Tree-sitter Parsers to WASM
        run: |
          mkdir -p web/public/parsers

          # Install tree-sitter CLI
          npm install -g tree-sitter-cli

          # Clone and build each grammar
          for lang in typescript python go rust java; do
            echo "Building $lang parser..."

            case $lang in
              typescript)
                REPO="tree-sitter/tree-sitter-typescript"
                DIR="tsx"  # or "typescript"
                ;;
              python)
                REPO="tree-sitter/tree-sitter-python"
                DIR="."
                ;;
              go)
                REPO="tree-sitter/tree-sitter-go"
                DIR="."
                ;;
              rust)
                REPO="tree-sitter/tree-sitter-rust"
                DIR="."
                ;;
              java)
                REPO="tree-sitter/tree-sitter-java"
                DIR="."
                ;;
            esac

            # Clone grammar repo
            if [ ! -d "/tmp/tree-sitter-$lang" ]; then
              git clone --depth 1 "https://github.com/$REPO.git" "/tmp/tree-sitter-$lang"
            fi

            # Build WASM parser
            cd "/tmp/tree-sitter-$lang/$DIR"
            tree-sitter build --wasm

            # Copy to output
            cp *.wasm "$GITHUB_WORKSPACE/web/public/parsers/$lang.wasm"
            cd "$GITHUB_WORKSPACE"
          done

          ls -la web/public/parsers/

      - name: Build Rust WASM Core
        run: |
          cd crates/gitnexus-core
          wasm-pack build --target web --out-dir ../../web/pkg             --features "gitnexus-parse/web-tree-sitter"

          # Verify output
          ls -la ../../web/pkg/

      - name: Download Embedding Model Assets
        run: |
          mkdir -p web/public/assets
          curl -L "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/ort/all-MiniLM-L6-v2/onnx/model_quantized.onnx" -o web/public/assets/all-MiniLM-L6-v2-quantized.onnx
          curl -L "https://huggingface.co/Xenova/all-MiniLM-L6-v2/raw/main/tokenizer.json" -o web/public/assets/tokenizer.json
          ls -lh web/public/assets/

      - name: Build Web UI
        run: |
          cd web
          npm run build

          # Add .nojekyll to prevent Jekyll processing
          touch dist/.nojekyll

          # Copy WASM files to dist
          cp -r public/parsers dist/
          cp -r public/assets dist/

          # Verify build
          ls -la dist/
          ls -la dist/pkg/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
